---
helm-toolkit:
  - |
    The ``helm-toolkit.utils.to_oslo_conf`` template no longer emits a line
    for keys whose value is ``nil``. Previously Go templates rendered nil as
    the literal string ``<no value>``, which oslo.config then rejected (for
    example, ``HostnameOpt`` fails with "is not a valid host address").
    Charts can now explicitly null an oslo.config key in their values to
    fall back to the service's built-in default, instead of having to
    override it with a real placeholder string.
