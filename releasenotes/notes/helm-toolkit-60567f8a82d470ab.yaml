---
helm-toolkit:
  fixes:
    - |
      The ``keystone_user`` script in helm-toolkit previously set the service
      user password unconditionally on every reconciliation. Keystone invalidates
      all active tokens for a user on every password update, which caused
      unnecessary disruption to long-lived service tokens in environments with
      frequent reconciliation (e.g. GitOps loops). The script now probes
      authentication with the candidate password first and skips the update if
      it succeeds. Unexpected probe failures (non-HTTP-401 errors) cause the
      job to abort rather than proceeding blindly.
