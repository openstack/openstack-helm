---
ovn:
  - |
    Add support for ``ovn-chassis-mac-mappings`` configuration on the OVN
    chassis. This is required for VLAN tenant networks in OVN; without it,
    traffic on VLAN tenant networks is silently dropped.

    Two new configuration options are introduced:

    * ``conf.ovn_chassis_mac_mappings``: explicitly set the MAC mappings,
      e.g. ``physnet1:fa:16:3e:aa:bb:cc``.
    * ``conf.auto_chassis_mac_mappings``: when ``true``,
      auto-generate a deterministic locally-administered unicast MAC per
      provider network per chassis using a hash of the hostname and physnet
      name. This guarantees a unique MAC per node without requiring manual
      per-node configuration.

    Both options are disabled by default to maintain backward compatibility.
