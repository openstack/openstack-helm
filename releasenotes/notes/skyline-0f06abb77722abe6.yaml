---
skyline:
  - |
    Added ``conf.nginx.default_language`` value (default: ``en``) to set
    the default language for the Skyline console. The skyline-console SPA
    defaults to Chinese (zh-cn) when the browser language does not exactly
    match a supported locale. This setting injects a ``lang`` cookie via
    nginx to ensure the console renders in the configured language.
