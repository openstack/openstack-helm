---
manila:
  - |
    When host is not explicitly configured, Manila uses the pod name as the backend host.
    In Kubernetes deployments this causes the host value to change whenever the pod is
    recreated, which breaks persistence and backend association behavior.

    Use a stable value (host: manila-share-worker) similar to the existing approach
    used in the Cinder chart. This avoids host changes across pod restarts while
    preserving consistent backend identity until proper clustered support is adopted.
