---
manila:
  - |
    Add an optional StatefulSet manifest for the manila-share service, gated
    by ``manifests.statefulset_share`` (disabled by default). When enabled,
    the existing ``deployment_share`` manifest is suppressed and each pod
    gets a stable, unique hostname (manila-share-0, manila-share-1, ...).
    If ``conf.manila.DEFAULT.host`` is left empty, each pod uses its own pod
    name as the backend host, which is the supported way to run more than
    one manila-share replica. The static ``host: manila-share-worker``
    default remains and is only safe with a single replica.
