---
features:
  - |
    The ``keystone_openrc_env_vars`` snippet now supports alternative
    Keystone authentication plugins via two new optional parameters
    in ``identity.openrc`` values: ``exclude_vars`` (a list of default
    environment variable names to omit) and ``extra_vars`` (a list of
    additional environment variable entries to inject). This enables
    the use of federated auth methods such as ``v3oidcaccesstoken``
    in ks-service, ks-endpoints, ks-user, and bootstrap jobs without
    requiring template overrides. The change is fully backwards-compatible.
