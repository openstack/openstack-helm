# Playbook for CloudKitty deployment.
#
# Usage in zuul.d job definition:
#   run:
#     - playbooks/deploy-env.yaml
#     - playbooks/deploy-cloudkitty.yaml
---
- hosts: primary
  tasks:
    - name: Prepare Kubernetes
      include_role:
        name: deploy-openstack
        tasks_from: prepare-k8s

    - name: Prepare charts
      include_role:
        name: deploy-openstack
        tasks_from: prepare-charts

    - name: Setup OpenStack client
      include_role:
        name: deploy-openstack
        tasks_from: setup-client

    - name: Deploy RabbitMQ
      include_role:
        name: deploy-openstack
        tasks_from: rabbitmq

    - name: Deploy MariaDB
      include_role:
        name: deploy-openstack
        tasks_from: mariadb

    - name: Deploy Memcached
      include_role:
        name: deploy-openstack
        tasks_from: memcached

    - name: Deploy Keystone
      include_role:
        name: deploy-openstack
        tasks_from: keystone

    - name: Deploy Heat
      include_role:
        name: deploy-openstack
        tasks_from: heat

    - name: Deploy Glance
      include_role:
        name: deploy-openstack
        tasks_from: glance
      vars:
        osh_glance_backend: local

    - name: Deploy Open vSwitch
      include_role:
        name: deploy-openstack
        tasks_from: openvswitch

    - name: Deploy Libvirt
      include_role:
        name: deploy-openstack
        tasks_from: libvirt

    - name: Deploy Placement
      include_role:
        name: deploy-openstack
        tasks_from: placement

    - name: Deploy Nova
      include_role:
        name: deploy-openstack
        tasks_from: nova

    - name: Deploy Neutron
      include_role:
        name: deploy-openstack
        tasks_from: neutron

    - name: Deploy CloudKitty
      include_role:
        name: deploy-openstack
        tasks_from: cloudkitty
