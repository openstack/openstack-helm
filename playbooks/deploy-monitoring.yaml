# Playbook for the monitoring stack (Prometheus, Grafana, Nagios, etc.).
#
# Deploys the prerequisite infrastructure (Docker registry, MariaDB,
# PostgreSQL in osh-infra) and then the monitoring stack components
# across osh-infra and kube-system namespaces.
#
# Usage in zuul.d job definition:
#   run:
#     - playbooks/deploy-env.yaml
#     - playbooks/deploy-monitoring.yaml
---
- hosts: primary
  tasks:
    - name: Prepare Kubernetes
      include_role:
        name: deploy-charts
        tasks_from: prepare-k8s

    - name: Prepare charts
      include_role:
        name: deploy-charts
        tasks_from: prepare-charts

    - name: Deploy docker-registry stack
      include_role:
        name: deploy-charts
        tasks_from: monitoring/docker-registry

    - name: Deploy MariaDB
      include_role:
        name: deploy-charts
        tasks_from: mariadb

    - name: Deploy PostgreSQL
      include_role:
        name: deploy-charts
        tasks_from: postgresql

    - name: Deploy Prometheus
      include_role:
        name: deploy-charts
        tasks_from: monitoring/prometheus

    - name: Deploy Prometheus Alertmanager
      include_role:
        name: deploy-charts
        tasks_from: monitoring/alertmanager

    - name: Deploy Kube State Metrics
      include_role:
        name: deploy-charts
        tasks_from: monitoring/kube-state-metrics

    - name: Deploy Node Problem Detector
      include_role:
        name: deploy-charts
        tasks_from: monitoring/node-problem-detector

    - name: Deploy Node Exporter
      include_role:
        name: deploy-charts
        tasks_from: monitoring/node-exporter

    - name: Deploy Process Exporter
      include_role:
        name: deploy-charts
        tasks_from: monitoring/process-exporter

    - name: Deploy Blackbox Exporter
      include_role:
        name: deploy-charts
        tasks_from: monitoring/blackbox-exporter

    - name: Deploy Grafana
      include_role:
        name: deploy-charts
        tasks_from: monitoring/grafana

    - name: Deploy Nagios
      include_role:
        name: deploy-charts
        tasks_from: monitoring/nagios

    - name: Run Grafana Selenium test
      include_role:
        name: deploy-charts
        tasks_from: monitoring/grafana-selenium

    - name: Run Prometheus Selenium test
      include_role:
        name: deploy-charts
        tasks_from: monitoring/prometheus-selenium

    - name: Run Nagios Selenium test
      include_role:
        name: deploy-charts
        tasks_from: monitoring/nagios-selenium
