# Playbook for cinder deployment and testing.
#
# Deploys Ceph (via Rook), then the OpenStack infrastructure
# services needed by Cinder, and finally Cinder itself.
#
# Usage in zuul.d job definition:
#   run:
#     - playbooks/deploy-env.yaml
#     - playbooks/deploy-cinder.yaml
---
- hosts: primary
  tasks:
    - name: Prepare Kubernetes
      include_role:
        name: deploy-openstack
        tasks_from: prepare-k8s

    - name: Prepare charts
      include_role:
        name: deploy-openstack
        tasks_from: prepare-charts

    - name: Setup OpenStack client
      include_role:
        name: deploy-openstack
        tasks_from: setup-client

    - name: Deploy Ceph Rook
      include_role:
        name: deploy-ceph

    - name: Deploy Ceph adapter Rook
      include_role:
        name: deploy-openstack
        tasks_from: ceph-adapter-rook

    - name: Deploy MariaDB
      include_role:
        name: deploy-openstack
        tasks_from: mariadb

    - name: Deploy Memcached
      include_role:
        name: deploy-openstack
        tasks_from: memcached

    - name: Deploy RabbitMQ
      include_role:
        name: deploy-openstack
        tasks_from: rabbitmq

    - name: Deploy Keystone
      include_role:
        name: deploy-openstack
        tasks_from: keystone

    - name: Deploy Cinder
      include_role:
        name: deploy-openstack
        tasks_from: cinder

    - name: Run functional tests
      shell: |
        set -xe
        ./tools/deployment/common/force-cronjob-run.sh
      args:
        chdir: "{{ zuul.project.src_dir }}"
        executable: /bin/bash
