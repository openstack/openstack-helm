{{- if .Values.manifests.cron_db_purge }}
{{- $envAll := . }}

{{- $mounts_manila_db_purge := .Values.pod.mounts.manila_db_purge.manila_db_purge }}
{{- $mounts_manila_db_purge_init := .Values.pod.mounts.manila_db_purge.init_container }}
{{- $etcSources := .Values.pod.etcSources.manila_db_purge }}

{{- $serviceAccountName := "manila-db-purge" }}
{{ tuple $envAll "db_purge" $serviceAccountName | include "helm-toolkit.snippets.kubernetes_pod_rbac_serviceaccount" }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: manila-db-purge
  labels:
{{ tuple $envAll "manila" "manila-db-purge" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 4 }}
  annotations:
    {{ tuple $envAll | include "helm-toolkit.snippets.release_uuid" }}
spec:
  schedule: {{ .Values.jobs.db_purge.cron | quote }}
  successfulJobsHistoryLimit: {{ .Values.jobs.db_purge.history.success }}
  failedJobsHistoryLimit: {{ .Values.jobs.db_purge.history.failed }}
  {{- if .Values.jobs.db_purge.starting_deadline }}
  startingDeadlineSeconds: {{ .Values.jobs.db_purge.starting_deadline }}
  {{- end }}
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
{{ tuple $envAll "manila" "db-purge" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 8 }}
    spec:
      template:
        metadata:
          labels:
{{ tuple $envAll "manila" "db-purge" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | indent 12 }}
          annotations:
{{ dict "envAll" $envAll "podName" $serviceAccountName "containerNames" (list "db-purge" "init") | include "helm-toolkit.snippets.kubernetes_mandatory_access_control_annotation" | indent 12 }}
        spec:
{{ tuple "manila_db_purge" . | include "helm-toolkit.snippets.kubernetes_pod_priority_class" | indent 10 }}
{{ tuple "manila_db_purge" . | include "helm-toolkit.snippets.kubernetes_pod_runtime_class" | indent 10 }}
{{ dict "envAll" $envAll "application" "db_purge" | include "helm-toolkit.snippets.kubernetes_pod_security_context" | indent 10 }}
          serviceAccountName: {{ $serviceAccountName }}
          restartPolicy: OnFailure
{{ if $envAll.Values.pod.tolerations.manila.enabled }}
{{ tuple $envAll "manila" | include "helm-toolkit.snippets.kubernetes_tolerations" | indent 10 }}
{{ end }}
          nodeSelector:
            {{ .Values.labels.job.node_selector_key }}: {{ .Values.labels.job.node_selector_value }}
          initContainers:
{{ tuple $envAll "db_purge" $mounts_manila_db_purge_init | include "helm-toolkit.snippets.kubernetes_entrypoint_init_container" | indent 12 }}
          containers:
            - name: db-purge
{{ tuple $envAll "manila_db_purge" | include "helm-toolkit.snippets.image" | indent 14 }}
{{ tuple $envAll $envAll.Values.pod.resources.jobs.db_purge | include "helm-toolkit.snippets.kubernetes_resources" | indent 14 }}
{{ dict "envAll" $envAll "application" "db_purge" "container" "manila_db_purge" | include "helm-toolkit.snippets.kubernetes_container_security_context" | indent 14 }}
              command:
                - /tmp/db-purge.sh
{{- if or .Values.manifests.certificates .Values.tls.identity }}
              env:
                - name: REQUESTS_CA_BUNDLE
                  value: "/etc/manila/certs/ca.crt"
{{- end }}
              volumeMounts:
                - name: pod-tmp
                  mountPath: /tmp
                - name: etcmanila
                  mountPath: /etc/manila
                - name: manila-etc
                  mountPath: /etc/manila/manila.conf
                  subPath: manila.conf
                  readOnly: true
                - name: manila-etc-snippets
                  mountPath: /etc/manila/manila.conf.d/
                  readOnly: true
                - name: manila-bin
                  mountPath: /tmp/db-purge.sh
                  subPath: db-purge.sh
                  readOnly: true
{{- dict "enabled" (or .Values.manifests.certificates .Values.tls.identity) "name" .Values.secrets.tls.share.api.internal "path" "/etc/manila/certs" | include "helm-toolkit.snippets.tls_volume_mount" | indent 16 }}
{{- dict "enabled" $envAll.Values.manifests.certificates "name" $envAll.Values.endpoints.oslo_db.auth.admin.secret.tls.internal "path" "/etc/mysql/certs" | include "helm-toolkit.snippets.tls_volume_mount" | indent 16 }}
{{- dict "enabled" $envAll.Values.manifests.certificates "name" $envAll.Values.endpoints.oslo_messaging.auth.admin.secret.tls.internal "path" "/etc/rabbitmq/certs" | include "helm-toolkit.snippets.tls_volume_mount" | indent 16 }}
{{ if $mounts_manila_db_purge.volumeMounts }}{{ toYaml $mounts_manila_db_purge.volumeMounts | indent 16 }}{{ end }}
          volumes:
            - name: pod-tmp
              emptyDir: {}
            - name: etcmanila
              emptyDir: {}
            - name: manila-etc
              secret:
                secretName: manila-etc
                defaultMode: 0444
            - name: manila-etc-snippets
{{- if $etcSources }}
              projected:
                sources:
{{ toYaml $etcSources | indent 18 }}
{{- else }}
              emptyDir: {}
{{ end }}
            - name: manila-bin
              configMap:
                name: manila-bin
                defaultMode: 0555
{{- dict "enabled" (or .Values.manifests.certificates .Values.tls.identity) "name" .Values.secrets.tls.share.api.internal | include "helm-toolkit.snippets.tls_volume" | indent 12 }}
{{- dict "enabled" $envAll.Values.manifests.certificates "name" $envAll.Values.endpoints.oslo_db.auth.admin.secret.tls.internal | include "helm-toolkit.snippets.tls_volume" | indent 12 }}
{{- dict "enabled" $envAll.Values.manifests.certificates "name" $envAll.Values.endpoints.oslo_messaging.auth.admin.secret.tls.internal | include "helm-toolkit.snippets.tls_volume" | indent 12 }}
{{ if $mounts_manila_db_purge.volumes }}{{ toYaml $mounts_manila_db_purge.volumes | indent 12 }}{{ end }}
{{- end }}
