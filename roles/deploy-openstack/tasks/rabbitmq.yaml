---
- name: Create Rabbit values file
  copy:
    dest: /tmp/rabbit.yaml
    content: |
      pod:
        replicas:
          server: 1
      volume:
        enabled: false
        use_local_path:
          enabled: true

- name: Deploy rabbitmq
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: rabbitmq
    osh_values_overrides_rabbitmq:
      - /tmp/rabbit.yaml
