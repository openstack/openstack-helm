---
- name: Deploy mariadb-backup
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: mariadb-backup
    osh_helm_timeout: 900
    osh_extra_helm_args: "--wait"

- name: Create manual mariadb backup job
  command: >-
    kubectl create job --from=cronjob/mariadb-backup
    mariadb-backup-manual-001 -n {{ osh_namespace | default('openstack') }}
  changed_when: true

- name: Wait for mariadb-backup pods
  command: helm osh wait-for-pods {{ osh_namespace | default('openstack') }}
  changed_when: false

- name: Check mariadb backup logs
  command: >-
    kubectl logs jobs/mariadb-backup-manual-001
    -n {{ osh_namespace | default('openstack') }}
  register: _mariadb_backup_logs
  changed_when: false

- name: Show mariadb backup logs
  debug:
    var: _mariadb_backup_logs.stdout_lines
