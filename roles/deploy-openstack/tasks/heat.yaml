---
- name: Deploy heat
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: heat

- name: "Print Openstack service list"
  shell:
    openstack service list
  environment:
    OS_CLOUD: openstack_helm

- name: "Print Openstack endpoint list"
  shell:
    openstack endpoint list
  environment:
    OS_CLOUD: openstack_helm

- name: "Print Openstack orchestration service list"
  shell:
    openstack orchestration service list
  environment:
    OS_CLOUD: openstack_helm
