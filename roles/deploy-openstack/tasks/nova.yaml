---
- name: Check if volume service is available
  shell: openstack service list -f value -c Type 2>/dev/null | grep -q '^volume'
  environment:
    OS_CLOUD: openstack_helm
  register: _volume_service
  failed_when: false
  changed_when: false

- name: Check if rbd volume type exists
  shell: openstack volume type list -f value -c Name 2>/dev/null | grep -q 'rbd'
  environment:
    OS_CLOUD: openstack_helm
  register: _rbd_type
  failed_when: false
  changed_when: false
  when: _volume_service.rc == 0

- name: Create Nova values file
  copy:
    dest: /tmp/nova.yaml
    content: |
      conf:
        nova:
          libvirt:
            virt_type: qemu
            cpu_mode: none
        ceph:
          enabled: {{ _volume_service.rc == 0 and (_rbd_type.rc | default(1)) == 0 }}
      bootstrap:
        wait_for_computes:
          enabled: true

- name: Deploy nova
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: nova
    osh_values_overrides_nova:
      - /tmp/nova.yaml
    osh_wait: false
