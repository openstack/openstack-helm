---
- name: Create Glance values file
  copy:
    dest: /tmp/glance.yaml
    content: |
      storage: {{ osh_glance_backend | default('local') }}

- name: Deploy glance
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: glance
    osh_values_overrides_glance:
      - /tmp/glance.yaml
    osh_helm_timeout: 800

- name: "Print Openstack service list"
  shell:
    openstack service list
  environment:
    OS_CLOUD: openstack_helm

- name: "Print Openstack image list"
  shell:
    openstack image list -f value -c ID 2>/dev/null
  environment:
    OS_CLOUD: openstack_helm
  register: _glance_images

- name: "Print detailed info for images"
  shell:
    openstack image show {{ item }}
  environment:
    OS_CLOUD: openstack_helm
  loop: "{{ _glance_images.stdout_lines }}"
