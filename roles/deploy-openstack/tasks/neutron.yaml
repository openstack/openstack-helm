---
- name: Create Neutron values file
  copy:
    dest: /tmp/neutron.yaml
    content: |
      network:
        interface:
          tunnel: brvxlan
      conf:
        neutron:
          DEFAULT:
            l3_ha: False
            max_l3_agents_per_router: 1
            l3_ha_network_type: vxlan
            dhcp_agents_per_network: 1
        auto_bridge_add:
          br-ex: provider1
        plugins:
          ml2_conf:
            ml2_type_flat:
              flat_networks: public
          openvswitch_agent:
            agent:
              tunnel_types: vxlan
            ovs:
              bridge_mappings: public:br-ex
      labels:
        agent:
          l3:
            node_selector_key: l3-agent
            node_selector_value: enabled

- name: Deploy neutron
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: neutron
    osh_values_overrides_neutron:
      - /tmp/neutron.yaml
    osh_wait_timeout: "1200"
