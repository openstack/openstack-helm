---
- name: Create OVN values file
  copy:
    dest: /tmp/ovn.yaml
    content: |
      volume:
        ovn_ovsdb_nb:
          enabled: false
        ovn_ovsdb_sb:
          enabled: false
      network:
        interface:
          tunnel: null
      conf:
        ovn_bridge_mappings: public:br-ex
        auto_bridge_add:
          br-ex: provider1

- name: Deploy ovn
  include_tasks: _helm_install.yaml
  vars:
    osh_chart: ovn
    osh_values_overrides_ovn:
      - /tmp/ovn.yaml
