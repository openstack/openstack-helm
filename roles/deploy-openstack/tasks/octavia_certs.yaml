# Generate dual intermediate CA certificates for Octavia and store
# them as a Kubernetes secret in the openstack namespace.
#
# Uses the existing create_dual_intermediate_CA.sh script which requires
# the openssl.cnf file in the same directory.
---
- name: Generate Octavia certificates and create K8s secret
  shell: |
    set -xe
    ./create_dual_intermediate_CA.sh

    trim_data() {
      cat "$1" | base64 -w0 | tr -d '\n'
    }

    cat <<EOF | kubectl apply --namespace openstack -f -
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: octavia-certs
    type: Opaque
    data:
      server_ca.cert.pem: $(trim_data dual_ca/etc/octavia/certs/server_ca.cert.pem)
      server_ca-chain.cert.pem: $(trim_data dual_ca/etc/octavia/certs/server_ca-chain.cert.pem)
      server_ca.key.pem: $(trim_data dual_ca/etc/octavia/certs/server_ca.key.pem)
      client_ca.cert.pem: $(trim_data dual_ca/etc/octavia/certs/client_ca.cert.pem)
      client.cert-and-key.pem: $(trim_data dual_ca/etc/octavia/certs/client.cert-and-key.pem)
    EOF
  args:
    chdir: "{{ zuul.project.src_dir }}/../openstack-helm/tools/deployment/component/octavia"
    executable: /bin/bash
  changed_when: true
