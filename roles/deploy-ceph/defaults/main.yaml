---
ceph_rook_release: "v1.19.3"
ceph_osd_data_device: "/dev/loop100"
ceph_image: "quay.io/ceph/ceph:v20.2.1"
ceph_rook_namespace: "rook-ceph"
ceph_cluster_namespace: "ceph"
ceph_cluster_name: "ceph"
ceph_mon_count: 3
ceph_mgr_count: 3
ceph_rgw_port: 8080
ceph_rgw_instances: 1
ceph_wait_timeout: 2400

# Optional: provision a CephFilesystem and a Rook-managed NFS-Ganesha
# (CephNFS) cluster on top of it. When true, the rook-ceph-cluster chart
# deploys an MDS plus a Ganesha pod, and the mgr `nfs` module is enabled.
# This is consumer-agnostic; any chart that needs CephFS or CephFS-over-NFS
# can use it. Per-consumer setup (auth users, keyring secrets, subvolume
# groups, share types) belongs to that consumer, not to this role.
ceph_enable_cephfs: false
ceph_fs_name: "cephfs"
ceph_nfs_cluster_id: "nfs"
