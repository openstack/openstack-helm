# Deploys Ceph via Rook operator.
#
# This replaces the shell script tools/deployment/ceph/ceph-rook.sh
# with native Ansible tasks. It installs the Rook operator, deploys
# a CephCluster, and waits for the cluster to become healthy.
---
- name: Render Rook operator values
  template:
    src: rook-operator-values.yaml.j2
    dest: /tmp/rook-operator-values.yaml
    mode: "0644"

- name: Render Rook cluster values
  template:
    src: rook-cluster-values.yaml.j2
    dest: /tmp/rook-cluster-values.yaml
    mode: "0644"

- name: Add Rook Helm repo
  command: helm repo add rook-release https://charts.rook.io/release
  changed_when: true

- name: Deploy Rook operator
  shell: |
    set -x
    cat /tmp/rook-operator-values.yaml
    helm upgrade --install --create-namespace --namespace {{ ceph_rook_namespace }} \
      rook-ceph rook-release/rook-ceph \
      --version {{ ceph_rook_release }} \
      -f /tmp/rook-operator-values.yaml
  args:
    executable: /bin/bash
  changed_when: true

- name: Wait for Rook operator to be ready
  command: >
    kubectl wait deployment rook-ceph-operator
    --namespace={{ ceph_rook_namespace }}
    --for=condition=Available
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false
  retries: 5
  delay: 30

- name: Deploy Rook Ceph cluster
  shell: |
    set -x
    cat /tmp/rook-cluster-values.yaml
    helm upgrade --install --create-namespace --namespace {{ ceph_cluster_namespace }} \
      rook-ceph-cluster \
      rook-release/rook-ceph-cluster \
      --set operatorNamespace={{ ceph_rook_namespace }} \
      --version {{ ceph_rook_release }} \
      --force-conflicts \
      -f /tmp/rook-cluster-values.yaml
  args:
    executable: /bin/bash
  changed_when: true


- name: Wait for CephCluster to reach Ready phase
  command: >
    kubectl wait cephcluster/{{ ceph_cluster_name }}
    --namespace={{ ceph_cluster_namespace }}
    --for=jsonpath={.status.phase}=Ready
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false

- name: Wait for CephObjectStore to reach Ready phase
  command: >
    kubectl wait cephobjectstore/default
    --namespace={{ ceph_cluster_namespace }}
    --for=jsonpath={.status.phase}=Ready
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false

# The toolbox pod is often scheduled before rook-ceph-mon-endpoints is
# populated, so its mounted ceph.conf falls back to DNS SRV discovery
# (_ceph-mon._tcp), which fails. Restarting after the cluster is Ready
# forces the new pod to read the correct mon list.
- name: Restart rook-ceph-tools to refresh mon endpoints
  command: >
    kubectl rollout restart deployment/rook-ceph-tools
    --namespace={{ ceph_cluster_namespace }}
  changed_when: true

- name: Wait for rook-ceph-tools rollout to complete
  command: >
    kubectl rollout status deployment/rook-ceph-tools
    --namespace={{ ceph_cluster_namespace }}
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false

- name: Validate Ceph cluster health
  shell: |
    set -xe
    TOOLS_POD=$(kubectl get pods \
      --namespace={{ ceph_cluster_namespace }} \
      --selector="app=rook-ceph-tools" \
      --no-headers | grep Running | awk '{ print $1; exit }')
    kubectl -n {{ ceph_cluster_namespace }} exec ${TOOLS_POD} -- ceph -s
  args:
    executable: /bin/bash
  changed_when: false

# --- Optional CephFS + NFS-Ganesha bring-up ---
# The CephFilesystem itself is provisioned by the rook-ceph-cluster chart
# via the cephFileSystems values key (rendered conditionally above).
- name: Wait for CephFilesystem to reach Ready phase
  command: >
    kubectl wait cephfilesystem/{{ ceph_fs_name }}
    --namespace={{ ceph_cluster_namespace }}
    --for=jsonpath={.status.phase}=Ready
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false
  when: ceph_enable_cephfs | bool

# Patch the mgr `nfs` module so manila's CephFS driver can call
# `ceph nfs cluster info` successfully. The rook orchestrator returns
# Host.addr as "<ip>/<hostname>", and the stock resolve_ip() does
# socket.getaddrinfo() on the combined string and fails with
# errno -22 / "Cannot resolve IP for host <ip>/<hostname>". The patch
# strips the suffix.
#
# Patching in-pod doesn't persist (rook may restart mgr containers and
# the writable layer is wiped), so we mount the patched file via a
# ConfigMap subPath.
- name: Render patched mgr nfs cluster.py
  shell: |
    set -e
    MGR=$(kubectl -n {{ ceph_cluster_namespace }} get deploy \
      -l app=rook-ceph-mgr -o jsonpath='{.items[0].metadata.name}')
    kubectl -n {{ ceph_cluster_namespace }} exec deploy/${MGR} -- \
      cat /usr/share/ceph/mgr/nfs/cluster.py > /tmp/mgr-nfs-cluster.py
    python3 - <<'PY'
    import sys
    p = '/tmp/mgr-nfs-cluster.py'
    s = open(p).read()
    marker = 'hostname = hostname.split("/")[0]'
    if marker in s:
        print('already-patched'); sys.exit(0)
    needle = 'def resolve_ip(hostname: str) -> str:\n    try:'
    if needle not in s:
        sys.stderr.write('resolve_ip pattern not found, cannot patch\n')
        sys.exit(1)
    s = s.replace(needle,
        'def resolve_ip(hostname: str) -> str:\n'
        '    # Strip "<ip>/<hostname>" suffix that the rook orchestrator\n'
        '    # adds to Host.addr -- stock resolve_ip cannot handle it.\n'
        '    hostname = hostname.split("/")[0]\n'
        '    try:', 1)
    open(p, 'w').write(s)
    print('patched')
    PY
  args:
    executable: /bin/bash
  register: _mgr_nfs_patch
  changed_when: _mgr_nfs_patch.stdout_lines | last == 'patched'
  when: ceph_enable_cephfs | bool

- name: Create mgr-nfs-patch ConfigMap
  shell: |
    kubectl -n {{ ceph_cluster_namespace }} create configmap mgr-nfs-patch \
      --from-file=cluster.py=/tmp/mgr-nfs-cluster.py \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: true
  when: ceph_enable_cephfs | bool

- name: Mount patched cluster.py into mgr deployments
  shell: |
    set -e
    for D in $(kubectl -n {{ ceph_cluster_namespace }} get deploy \
        -l app=rook-ceph-mgr -o jsonpath='{.items[*].metadata.name}'); do
      kubectl -n {{ ceph_cluster_namespace }} patch deploy "$D" --type=strategic -p \
        '{"spec":{"template":{"spec":{"volumes":[{"name":"mgr-nfs-patch","configMap":{"name":"mgr-nfs-patch"}}],"containers":[{"name":"mgr","volumeMounts":[{"name":"mgr-nfs-patch","mountPath":"/usr/share/ceph/mgr/nfs/cluster.py","subPath":"cluster.py","readOnly":true}]}]}}}}'
    done
  args:
    executable: /bin/bash
  changed_when: true
  when: ceph_enable_cephfs | bool

- name: Wait for mgr deployments to roll out with patch
  shell: |
    set -e
    for D in $(kubectl -n {{ ceph_cluster_namespace }} get deploy \
        -l app=rook-ceph-mgr -o jsonpath='{.items[*].metadata.name}'); do
      kubectl -n {{ ceph_cluster_namespace }} rollout status \
        deploy/"$D" --timeout={{ ceph_wait_timeout }}s
    done
  args:
    executable: /bin/bash
  changed_when: false
  when: ceph_enable_cephfs | bool

# `ceph nfs cluster info` and related commands need the rook
# orchestrator backend so the mgr can talk to the rook operator.
- name: Enable rook orchestrator backend
  shell: |
    set -xe
    kubectl -n {{ ceph_cluster_namespace }} exec deploy/rook-ceph-tools -- \
      ceph mgr module enable rook
    kubectl -n {{ ceph_cluster_namespace }} exec deploy/rook-ceph-tools -- \
      ceph orch set backend rook
  args:
    executable: /bin/bash
  changed_when: true
  when: ceph_enable_cephfs | bool

- name: Render CephNFS manifest
  template:
    src: cephnfs.yaml.j2
    dest: /tmp/cephnfs.yaml
    mode: "0644"
  when: ceph_enable_cephfs | bool

- name: Apply CephNFS manifest
  command: kubectl apply -f /tmp/cephnfs.yaml
  changed_when: true
  when: ceph_enable_cephfs | bool

- name: Wait for CephNFS to reach Ready phase
  command: >
    kubectl wait cephnfs/{{ ceph_nfs_cluster_id }}
    --namespace={{ ceph_cluster_namespace }}
    --for=jsonpath={.status.phase}=Ready
    --timeout={{ ceph_wait_timeout }}s
  changed_when: false
  when: ceph_enable_cephfs | bool

