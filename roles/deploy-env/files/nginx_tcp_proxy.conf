user  nginx;
worker_processes  auto;

error_log  /dev/stdout warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

stream {
    access_log off;

    # Ingress controller proxy (for services not using Gateway API)
    server {
        listen {{ tcpproxy_ingress_openstack_cidr | ipaddr('address') }}:80;
        proxy_pass {{ metallb_ingress_openstack_endpoint_cidr | ipaddr('address') }}:80;
        proxy_bind {{ tcpproxy_ingress_openstack_cidr | ipaddr('address') }} transparent;
    }

    server {
        listen {{ tcpproxy_ingress_openstack_cidr | ipaddr('address') }}:443;
        proxy_pass {{ metallb_ingress_openstack_endpoint_cidr | ipaddr('address') }}:443;
        proxy_bind {{ tcpproxy_ingress_openstack_cidr | ipaddr('address') }} transparent;
    }

    # Gateway API proxy (for services using HTTPRoute)
    server {
        listen {{ tcpproxy_gatewayapi_cidr | ipaddr('address') }}:80;
        proxy_pass {{ metallb_gatewayapi_endpoint_cidr | ipaddr('address') }}:80;
        proxy_bind {{ tcpproxy_gatewayapi_cidr | ipaddr('address') }} transparent;
    }

    server {
        listen {{ tcpproxy_gatewayapi_cidr | ipaddr('address') }}:443;
        proxy_pass {{ metallb_gatewayapi_endpoint_cidr | ipaddr('address') }}:443;
        proxy_bind {{ tcpproxy_gatewayapi_cidr | ipaddr('address') }} transparent;
    }

{% if ganesha_backend_ip is defined and ganesha_backend_ip %}
    # Manila NFS-Ganesha proxy (port 2049). Bridges tenant VMs to the
    # Ganesha pod's hostNetwork IP, which is otherwise not reachable
    # from the OVS public network because direct traffic from br-ex
    # to brvxlan is blocked on the host.
    #
    # Deliberately NOT using `proxy_bind ... transparent`: with TPROXY
    # the VM's source IP would be preserved, but the return path from
    # Ganesha's node back to a 172.24.4.0/24 address has no route on
    # other K8s nodes. Without TPROXY, nginx connects with the host's
    # own brvxlan IP as source; Ganesha sees one source IP regardless
    # of which VM is mounting, so manila access rules need to grant
    # that single source.
    server {
        listen {{ tcpproxy_nfs_ganesha_cidr | ipaddr('address') }}:2049;
        proxy_pass {{ ganesha_backend_ip }}:2049;
    }
{% endif %}
}
