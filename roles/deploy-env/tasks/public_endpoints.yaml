---
- name: Create openstack ingress service
  when:
    - ingress_setup
    - ingress_openstack_setup
    - inventory_hostname in (groups['primary'] | default([]))
  become: false
  shell: |
    tee > /tmp/ingress_openstack_endpoint_service.yaml <<EOF
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      labels:
        kubernetes.io/metadata.name: openstack
        name: openstack
      name: openstack
    ---
    kind: Service
    apiVersion: v1
    metadata:
      name: public-openstack
      namespace: openstack
      annotations:
        metallb.universe.tf/loadBalancerIPs: "{{ metallb_ingress_openstack_endpoint_cidr | ipaddr('address') }}"
    spec:
      externalTrafficPolicy: Cluster
      type: LoadBalancer
      selector:
        app: ingress-api
      ports:
        - name: http
          port: 80
        - name: https
          port: 443
    EOF
    kubectl apply -f /tmp/ingress_openstack_endpoint_service.yaml

- name: Create osh-infra ingress service
  when:
    - ingress_setup
    - ingress_osh_infra_setup
    - inventory_hostname in (groups['primary'] | default([]))
  become: false
  shell: |
    tee > /tmp/ingress_osh_infra_endpoint_service.yaml <<EOF
    ---
    apiVersion: v1
    kind: Namespace
    metadata:
      labels:
        kubernetes.io/metadata.name: osh-infra
        name: osh-infra
      name: osh-infra
    ---
    kind: Service
    apiVersion: v1
    metadata:
      name: public-osh-infra
      namespace: osh-infra
      annotations:
        metallb.universe.tf/loadBalancerIPs: "{{ metallb_ingress_osh_infra_endpoint_cidr | ipaddr('address') }}"
    spec:
      externalTrafficPolicy: Cluster
      type: LoadBalancer
      selector:
        app: ingress-api
      ports:
        - name: http
          port: 80
        - name: https
          port: 443
    EOF
    kubectl apply -f /tmp/ingress_osh_infra_endpoint_service.yaml

- name: Create Gateway for OpenStack services
  when:
    - gatewayapi_setup
    - gatewayapi_implementation == "envoy"
    - metallb_setup
    - inventory_hostname in (groups['primary'] | default([]))
  become: false
  shell: |
    tee > /tmp/gatewayapi_envoy_default.yaml <<EOF
    ---
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyProxy
    metadata:
      name: gateway-proxy-default
      namespace: envoy-gateway-system
    spec:
      provider:
        type: Kubernetes
        kubernetes:
          envoyService:
            type: LoadBalancer
            externalTrafficPolicy: Cluster
            annotations:
              metallb.universe.tf/loadBalancerIPs: "{{ metallb_gatewayapi_endpoint_cidr | ipaddr('address') }}"
            patch:
              type: StrategicMerge
              value:
                spec:
                  externalTrafficPolicy: Cluster
    ---
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: gateway-default
      namespace: envoy-gateway-system
    spec:
      gatewayClassName: default
      infrastructure:
        parametersRef:
          group: gateway.envoyproxy.io
          kind: EnvoyProxy
          name: gateway-proxy-default
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
    ---
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: BackendTrafficPolicy
    metadata:
      name: gateway-backend-timeout
      namespace: envoy-gateway-system
    spec:
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: gateway-default
      timeout:
        http:
          requestTimeout: "{{ gatewayapi_backend_request_timeout }}"
    EOF
    kubectl apply -f /tmp/gatewayapi_envoy_default.yaml

- name: Set dnsmasq listen ip
  set_fact:
    nameserver_ip: >-
      {{
        overlay_network_prefix ~ ((groups['all'] | sort).index(groups['primary'][0]) + 1) if overlay_network_setup | bool
        else (groups['primary'] | map('extract', hostvars, ['ansible_default_ipv4', 'address']) | first)
      }}

- debug:
    msg: "nameserver_ip = {{ nameserver_ip }}"

- name: Start dnsmasq
  when:
    - inventory_hostname in (groups['primary'] | default([]))
  docker_container:
    name: endpoint_dnsmasq
    image: "{{ dnsmasq_image }}"
    network_mode: host
    capabilities:
      - NET_ADMIN
    entrypoint: dnsmasq
    command: >-
      --keep-in-foreground
      --no-hosts
      --bind-interfaces
      --address="/openstack-helm.org/{{ metallb_gatewayapi_endpoint_cidr | ipaddr('address') }}"
      --listen-address="{{ nameserver_ip }}"
      --no-resolv
      --server={{ dnsmasq_dns_server }}
      {{ dnsmasq_extra_args | default('') }}
    state: started
    recreate: yes

- name: Configure /etc/resolv.conf
  template:
    src: files/resolv.conf
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: 0644
  vars:
    nameserver_ip: "{{ nameserver_ip }}"

- name: Restart coredns to re-read resolv.conf changes
  become: false
  shell: |
    kubectl rollout restart -n kube-system deployment/coredns
    kubectl rollout status -n kube-system deployment/coredns --timeout=120s
  when: inventory_hostname in (groups['primary'] | default([]))
...
