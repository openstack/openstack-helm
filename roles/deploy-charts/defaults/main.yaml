---
osh_helm_repo: "{{ ansible_facts['user_dir'] }}/{{ zuul.project.src_dir }}/../openstack-helm"
osh_git_repo: "{{ ansible_facts['user_dir'] }}/{{ zuul.project.src_dir }}/../openstack-helm"
osh_values_overrides_path: "{{ osh_git_repo }}/values_overrides"
osh_values_overrides: []
osh_namespace: osh
osh_create_namespace: true
osh_helm_timeout: 600
osh_openstack_client_image_tag: 2026.1-ubuntu_noble
osh_helm_tests_tries: 2
osh_test_timeout: 1200

# TLS settings for OpenStack client (clouds.yaml)
osh_openstack_client_tls: false
osh_openstack_client_tls_ca_cert_path: "/etc/openstack/ca.pem"
osh_openstack_client_tls_ca_cert_secret_namespace: cert-manager
osh_openstack_client_tls_ca_cert_secret_name: selfsigned-ca-key-pair
osh_openstack_client_tls_ca_cert_secret_key: ca.crt
# CA-only secret (just ca.crt, no private key) provisioned into the workload
# namespace so charts can trust outbound TLS endpoints (secrets.tls.ca) without
# mounting any server/CA private key. Derived from the ca-issuer CA above.
osh_openstack_client_tls_namespace_ca_secret_name: openstack-helm-ca

# Octavia defaults
osh_octavia_lb_subnet: "172.31.0.0/24"
osh_octavia_lb_subnet_start: "172.31.0.2"
osh_octavia_lb_subnet_end: "172.31.0.200"
osh_octavia_amphora_image_name: "amphora-x64-haproxy-ubuntu-jammy"
osh_octavia_amphora_image_file: "test-only-amphora-x64-haproxy-ubuntu-jammy.qcow2"
osh_octavia_amphora_image_url: "https://tarballs.opendev.org/openstack/octavia/test-images/test-only-amphora-x64-haproxy-ubuntu-jammy.qcow2"
