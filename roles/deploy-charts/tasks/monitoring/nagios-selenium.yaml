---
- name: Ensure artifacts directory exists
  file:
    path: /tmp/artifacts
    state: directory

- name: Run Nagios Selenium test
  shell: |
    set -xe
    python3 tools/gate/selenium/nagiosSelenium.py
  args:
    chdir: "{{ osh_git_repo }}"
    executable: /bin/bash
  environment:
    CHROMEDRIVER: /etc/selenium/chromedriver
    ARTIFACTS_DIR: /tmp/artifacts/
    NAGIOS_USER: nagiosadmin
    NAGIOS_PASSWORD: password
    NAGIOS_URI: nagios.openstack-helm.org
  ignore_errors: true
