---
- name: Deploy prometheus
  include_tasks: _install.yaml
  vars:
    osh_chart: prometheus
    osh_values_overrides_prometheus:
      - alertmanager.yaml
      - ceph.yaml
      - elasticsearch.yaml
      - kubernetes.yaml
      - nodes.yaml
      - openstack.yaml
      - postgresql.yaml
      - apparmor.yaml
    osh_set_values:
      network.prometheus.ingress.classes.namespace: ingress-osh-infra
      storage.enabled: "false"
      storage.use_local_path.enabled: "true"

- name: Run prometheus Helm tests
  include_tasks: _test.yaml
  vars:
    osh_chart: prometheus
