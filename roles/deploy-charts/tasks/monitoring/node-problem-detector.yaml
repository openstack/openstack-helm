---
- name: Create kubernetes-node-problem-detector values file
  copy:
    dest: /tmp/kubernetes-node-problem-detector.yaml
    content: |
      monitoring:
        prometheus:
          pod:
            enabled: false
          service:
            enabled: true
      manifests:
        service: true

- name: Deploy kubernetes-node-problem-detector
  include_tasks: _install.yaml
  vars:
    osh_chart: kubernetes-node-problem-detector
    osh_namespace: kube-system
    osh_values_overrides:
      - /tmp/kubernetes-node-problem-detector.yaml
