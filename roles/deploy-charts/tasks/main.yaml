# Use this role with tasks_from to install Helm charts, run their tests, or
# deploy specific OpenStack/logging/monitoring components.
#
# Generic chart install / test:
#   - include_role:
#       name: deploy-charts
#       tasks_from: _install
#     vars:
#       osh_chart: keystone
#
#   - include_role:
#       name: deploy-charts
#       tasks_from: _test
#     vars:
#       osh_chart: keystone
#
# Component-specific deploys (each one wires up its own values overrides):
#   - include_role:
#       name: deploy-charts
#       tasks_from: keystone        # or mariadb, nova, grafana, fluentd, ...
---
- name: "deploy-charts role loaded"
  debug:
    msg: "Use tasks_from=<component> (keystone, nova, grafana, ...) or tasks_from=install/test for the generic helpers"
