---
- name: Ensure artifacts directory exists
  file:
    path: /tmp/artifacts
    state: directory

- name: Run Kibana Selenium test
  shell: |
    set -xe
    python3 tools/gate/selenium/kibanaSelenium.py
  args:
    chdir: "{{ osh_git_repo }}"
    executable: /bin/bash
  environment:
    CHROMEDRIVER: /etc/selenium/chromedriver
    ARTIFACTS_DIR: /tmp/artifacts/
    KIBANA_USER: admin
    KIBANA_PASSWORD: changeme
    KIBANA_URI: kibana.openstack-helm.org
    KERNEL_QUERY: "discove?r_g=()&_a=(columns:!(_source),index:'kernel*',interval:auto,query:(language:kuery,query:''),sort:!('@timestamp',desc))"
    JOURNAL_QUERY: "discove?r_g=()&_a=(columns:!(_source),index:'journal*',interval:auto,query:(language:kuery,query:''),sort:!('@timestamp',desc))"
    LOGSTASH_QUERY: "discove?r_g=()&_a=(columns:!(_source),index:'logstash*',interval:auto,query:(language:kuery,query:''),sort:!('@timestamp',desc))"
  ignore_errors: true
