- name: Label core namespaces
  command: kubectl label --overwrite namespace {{ item.namespace }} name={{ item.label }}
  loop:
    - { namespace: default, label: default }
    - { namespace: kube-system, label: kube-system }
    - { namespace: kube-public, label: kube-public }
  loop_control:
    label: "{{ item.namespace }}"


- name: Label all nodes
  command: kubectl label --overwrite nodes --all {{ item }}
  loop:
    - openstack-control-plane=enabled
    - openvswitch=enabled

# On multi-node nodesets, keep openstack-compute-node off the K8s
# control-plane node so Nova does not schedule tenant VMs onto it
# (without this, vm2 in a 2-VM anti-affinity set tends to land on the
# control-plane and the combination of etcd/apiserver + rook-ceph mgr
# + Ganesha + a tenant VM drives the node into sshd unresponsiveness).
# On single-node nodesets the control-plane is the only node, so fall
# back to labelling all nodes.
- name: Count worker (non-control-plane) nodes
  # `-o name` prints `node/<name>` per match and nothing on no-match,
  # regardless of kubectl version. `--no-headers` was version-dependent:
  # some kubectl builds emit "No resources found" to stdout, which
  # silently makes stdout_lines | length == 1 and misroutes the
  # single-node branch below into the multi-node one.
  command: >-
    kubectl get nodes -l '!node-role.kubernetes.io/control-plane'
    -o name
  register: _osh_worker_nodes
  changed_when: false

- name: Label worker nodes for Nova compute (multi-node)
  command: >-
    kubectl label --overwrite
    nodes -l '!node-role.kubernetes.io/control-plane'
    openstack-compute-node=enabled
  when: _osh_worker_nodes.stdout_lines | length > 0

- name: Label all nodes for Nova compute (single-node fallback)
  command: kubectl label --overwrite nodes --all openstack-compute-node=enabled
  when: _osh_worker_nodes.stdout_lines | length == 0

- name: Label control-plane nodes
  command: kubectl label --overwrite nodes -l node-role.kubernetes.io/control-plane {{ item }}
  loop:
    - l3-agent=enabled
    - openstack-network-node=enabled

# Provision a CA-ONLY trust secret (just ca.crt, no private key) into the
# workload namespace so charts can validate outbound TLS via secrets.tls.ca
# without ever mounting server/CA signing material. Charts assume every in-pod
# TLS server cert is signed by this one ca-issuer CA managed by cert-manager.
- name: Provision CA-only trust secret in the workload namespace
  when: osh_openstack_client_tls | bool
  block:
    - name: Read CA certificate from cert-manager Secret
      command:
        argv:
          - kubectl
          - -n
          - "{{ osh_openstack_client_tls_ca_cert_secret_namespace }}"
          - get
          - secret
          - "{{ osh_openstack_client_tls_ca_cert_secret_name }}"
          - -o
          - "jsonpath={.data.ca\\.crt}"
      register: _osh_ca_cert_b64
      changed_when: false

    - name: Create CA-only trust secret in {{ osh_namespace | default('osh') }}
      shell: |
        set -xe
        kubectl create namespace {{ osh_namespace | default('osh') }} \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl -n {{ osh_namespace | default('osh') }} create secret generic \
          {{ osh_openstack_client_tls_namespace_ca_secret_name }} \
          --from-literal=ca.crt="$(echo '{{ _osh_ca_cert_b64.stdout }}' | base64 -d)" \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true
