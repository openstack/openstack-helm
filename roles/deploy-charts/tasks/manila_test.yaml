# End-to-end test for the Manila chart.
#
# Uses Heat to create an NFS share (via the cephfsnfs backend) and two
# Nova VMs that mount it. Then SSHes in: VM1 writes a file to the share,
# VM2 reads it back and verifies the content matches.
---
- name: Wait for Manila API to be ready
  shell: |
    set -xe
    openstack share service list
  args:
    chdir: "{{ osh_git_repo }}"
    executable: /bin/bash
  environment:
    OS_CLOUD: openstack_helm
  retries: 30
  delay: 10
  register: manila_api_check
  until: manila_api_check.rc == 0

- name: Run Manila end-to-end share test
  shell: |
    set -xe
    ./tools/deployment/component/manila/test-share.sh
  args:
    chdir: "{{ osh_git_repo }}"
    executable: /bin/bash
