---
conf:
  gnocchi:
    database:
      connection: null
    indexer:
      url: null

manifests:
  job_db_init: false
  job_db_init_indexer: false
  secret_db_indexer: false

etcSources:
  gnocchi_api:
    - gnocchi-db-conn
  gnocchi_db_sync:
    - gnocchi-db-conn

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: gnocchi
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: gnocchi
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      passwordSecretKeyRef:
        name: gnocchi-db-password
        key: password
      # This field is immutable and defaults to 10, 0 means unlimited.
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: gnocchi-grant
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "gnocchi"
      table: "*"
      username: gnocchi
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: gnocchi-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: gnocchi
      passwordSecretKeyRef:
        name: gnocchi-db-password
        key: password
      database: gnocchi
      secretName: gnocchi-db-conn
      secretTemplate:
        key: db_conn.conf
        format: |
          [database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
...
