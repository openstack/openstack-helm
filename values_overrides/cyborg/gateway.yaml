# Gateway API overrides for Cyborg.
#
# Public endpoints use *.openstack-helm.org FQDNs which are resolved by
# dnsmasq to the MetalLB Gateway VIP. In-cluster pods reach the Gateway
# through this DNS path so no ExternalName services are needed.
---
endpoints:
  accelerator:
    host_fqdn_override:
      public:
        host: cyborg.openstack-helm.org

manifests:
  ingress_api: false
  service_ingress_api: false

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: cyborg-route
      namespace: openstack
    spec:
      hostnames:
        - "{{ .Values.endpoints.accelerator.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: cyborg-api
              port: 6666
...
