---
conf:
  octavia:
    database:
      connection: null
    task_flow:
      persistence_connection: null

manifests:
  job_db_init: false
  secret_db_persistence: false

etcSources:
  octavia_api:
    - octavia-db-conn
  octavia_db_sync:
    - octavia-db-conn

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: octavia
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: octavia
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      passwordSecretKeyRef:
        name: octavia-db-password
        key: password
      # This field is immutable and defaults to 10, 0 means unlimited.
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: octavia-grant
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "octavia"
      table: "*"
      username: octavia
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: octavia-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: octavia
      passwordSecretKeyRef:
        name: octavia-db-password
        key: password
      database: octavia
      secretName: octavia-db-conn
      secretTemplate:
        key: db_conn.conf
        format: |
          [database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
...
