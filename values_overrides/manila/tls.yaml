---
endpoints:
  oslo_db:
    host_fqdn_override:
      default:
        tls:
          issuerRef:
            name: ca-issuer
            kind: ClusterIssuer
          usages:
            - client auth
  oslo_messaging:
    port:
      https:
        default: 15680
conf:
  manila:
    oslo_messaging_rabbit:
      ssl: true
      ssl_ca_file: /etc/rabbitmq/certs/ca.crt
      ssl_cert_file: /etc/rabbitmq/certs/tls.crt
      ssl_key_file: /etc/rabbitmq/certs/tls.key
manifests:
  certificates: true
tls:
  oslo_db: true
  oslo_messaging: true
...
