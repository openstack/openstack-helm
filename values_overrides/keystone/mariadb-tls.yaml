# Enable TLS for the keystone to MariaDB connection.
#
# Renders a dedicated client certificate (signed by ca-issuer) that keystone
# presents for its mTLS backend connections, separate from the MariaDB and
# RabbitMQ server certificates. Requires cert-manager (cert_manager_setup) to
# issue it. The same certificate is reused for the RabbitMQ connection (see
# messaging-tls.yaml).
---
endpoints:
  oslo_db:
    host_fqdn_override:
      default:
        tls:
          secretName: keystone-client
          issuerRef:
            name: ca-issuer
            kind: ClusterIssuer
          usages:
            - client auth
tls:
  oslo_db: true
...
