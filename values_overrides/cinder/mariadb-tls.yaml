# Enable TLS for the cinder to MariaDB connection.
#
# Renders a dedicated client certificate (signed by ca-issuer) that cinder presents
# when connecting to MariaDB over TLS, separate from the MariaDB server
# certificate. Requires cert-manager (cert_manager_setup) to issue it.
---
endpoints:
  oslo_db:
    host_fqdn_override:
      default:
        tls:
          secretName: cinder-mariadb-client
          issuerRef:
            name: ca-issuer
            kind: ClusterIssuer
          usages:
            - client auth
tls:
  oslo_db: true
...
