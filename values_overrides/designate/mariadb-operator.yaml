---
conf:
  designate:
    database:
      connection: null
    storage:sqlalchemy:
      connection: null

manifests:
  job_db_init: false

etcSources:
  designate_api:
    - designate-db-conn
  designate_db_sync:
    - designate-db-conn

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: designate
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: designate
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      passwordSecretKeyRef:
        name: designate-db-password
        key: password
      # This field is immutable and defaults to 10, 0 means unlimited.
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: designate-grant
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "designate"
      table: "*"
      username: designate
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: designate-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: designate
      passwordSecretKeyRef:
        name: designate-db-password
        key: password
      database: designate
      secretName: designate-db-conn
      secretTemplate:
        key: db_conn.conf
        format: |
          [database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
...
