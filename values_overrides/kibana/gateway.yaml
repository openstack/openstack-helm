# Gateway API overrides for Kibana.
#
# Public endpoints use *.openstack-helm.org FQDNs which are resolved by
# dnsmasq to the MetalLB Gateway VIP. In-cluster pods reach the Gateway
# through this DNS path so no ExternalName services are needed.
---
endpoints:
  kibana:
    host_fqdn_override:
      public:
        host: kibana.openstack-helm.org

manifests:
  ingress: false
  service_ingress: false

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: kibana-route
      namespace: openstack
    spec:
      hostnames:
        - "{{ .Values.endpoints.kibana.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: kibana-dash
              port: 5601
...
