# Gateway API + TLS overrides for Neutron.
#
# Same as gateway.yaml but registers the public endpoint as https://...
---
endpoints:
  network:
    host_fqdn_override:
      public:
        host: neutron.openstack-helm.org
    scheme:
      public: https
    port:
      api:
        public: 443

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: neutron-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.network.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: neutron-server
              port: 9696
...
