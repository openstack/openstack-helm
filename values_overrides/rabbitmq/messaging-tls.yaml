# Enable server-side TLS for RabbitMQ with mutual TLS (mTLS) enforced.
#
# Renders the RabbitMQ server certificate (rabbitmq-tls-direct) and requires
# every AMQP client to present a client certificate signed by the same
# ca-issuer CA (fail_if_no_peer_cert: true). OpenStack services present a
# dedicated per-chart client certificate (<chart>-client); see
# values_overrides/<chart>/messaging-tls.yaml. Requires cert-manager
# (cert_manager_setup).
---
conf:
  rabbitmq:
    ssl_options:
      cacertfile: "/etc/rabbitmq/certs/ca.crt"
      certfile: "/etc/rabbitmq/certs/tls.crt"
      keyfile: "/etc/rabbitmq/certs/tls.key"
      verify: verify_peer
      fail_if_no_peer_cert: true
    management:
      ssl:
        cacertfile: "/etc/rabbitmq/certs/ca.crt"
        certfile: "/etc/rabbitmq/certs/tls.crt"
        keyfile: "/etc/rabbitmq/certs/tls.key"
endpoints:
  oslo_messaging:
    host_fqdn_override:
      default:
        tls:
          secretName: rabbitmq-tls-direct
          issuerRef:
            name: ca-issuer
            kind: ClusterIssuer
    port:
      https:
        default: 15680
        public: 443
manifests:
  certificates: true
...
