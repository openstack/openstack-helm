---
conf:
  placement:
    placement_database:
      connection: null

manifests:
  job_db_init: false

etcSources:
  placement_api:
    - placement-db-conn
  placement_db_sync:
    - placement-db-conn

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: placement
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: placement
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      passwordSecretKeyRef:
        name: placement-db-password
        key: password
      # This field is immutable and defaults to 10, 0 means unlimited.
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: placement-grant
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "placement"
      table: "*"
      username: placement
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: placement-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: placement
      passwordSecretKeyRef:
        name: placement-db-password
        key: password
      database: placement
      secretName: placement-db-conn
      secretTemplate:
        key: db_conn.conf
        format: |
          [database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
...
