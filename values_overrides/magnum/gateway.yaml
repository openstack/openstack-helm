# Gateway API overrides for Magnum.
#
# Public endpoints use *.openstack-helm.org FQDNs which are resolved by
# dnsmasq to the MetalLB Gateway VIP. In-cluster pods reach the Gateway
# through this DNS path so no ExternalName services are needed.
---
endpoints:
  container_infra:
    host_fqdn_override:
      public:
        host: magnum.openstack-helm.org

manifests:
  ingress_api: false
  service_ingress_api: false

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: magnum-route
      namespace: openstack
    spec:
      hostnames:
        - "{{ .Values.endpoints.container_infra.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: magnum-api
              port: 9511
...
