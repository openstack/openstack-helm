# Gateway API overrides for Glance.
#
# Public endpoints use *.openstack-helm.org FQDNs which are resolved by
# dnsmasq to the MetalLB Gateway VIP. In-cluster pods reach the Gateway
# through this DNS path so no ExternalName services are needed.
---
endpoints:
  image:
    host_fqdn_override:
      public:
        host: glance.openstack-helm.org

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: glance-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.image.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          # Large image uploads (e.g. the amphora qcow2) can take minutes.
          timeouts:
            request: 600s
            backendRequest: 600s
          backendRefs:
            - name: glance-api
              port: 9292
...
