---
conf:
  nova:
    database:
      connection: null
    api_database:
      connection: null
    cell0_database:
      connection: null

manifests:
  job_db_init: false
  secret_db_api: false
  secret_db_cell0: false

etcSources:
  nova_api_ospi:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn
  nova_api_metadata:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn
  nova_conductor:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn
  nova_scheduler:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn
  nova_cell_setup:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn
  nova_db_sync:
    - nova-db-conn
    - nova-api-db-conn
    - nova-cell0-db-conn

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova_api
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova_cell0
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: nova
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      passwordSecretKeyRef:
        name: nova-db-password
        key: password
      # This field is immutable and defaults to 10, 0 means unlimited.
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova"
      table: "*"
      username: nova
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova-api
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova_api"
      table: "*"
      username: nova
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova-cell0
      namespace: openstack
    spec:
      mariaDbRef:
        name: mariadb  # name of the MariaDB kind
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova_cell0"
      table: "*"
      username: nova
      grantOption: false
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: nova-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: nova
      passwordSecretKeyRef:
        name: nova-db-password
        key: password
      database: nova
      secretName: nova-db-conn
      secretTemplate:
        key: db_conn.conf
        format: |
          [database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: nova-api-db-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: nova
      passwordSecretKeyRef:
        name: nova-db-password
        key: password
      database: nova
      secretName: nova-api-db-conn
      secretTemplate:
        key: api_db_conn.conf
        format: |
          [api_database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Connection
    metadata:
      name: nova-db-cell0-conn
    spec:
      mariaDbRef:
        name: mariadb
      username: nova
      passwordSecretKeyRef:
        name: nova-db-password
        key: password
      database: nova_cell0
      secretName: nova-cell0-db-conn
      secretTemplate:
        key: cell0_db_conn.conf
        format: |
          [cell0_database]
          connection = mysql+pymysql://{{ .Username }}:{{ .Password }}@{{ .Host }}:{{ .Port }}/{{ .Database }}{{ .Params }}
      healthCheck:
        interval: 30s
        retryInterval: 3s
      serviceName: mariadb
...
