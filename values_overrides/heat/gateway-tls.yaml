# Gateway API + TLS overrides for Heat.
#
# Same as gateway.yaml but registers the public endpoints as https://...
---
endpoints:
  orchestration:
    host_fqdn_override:
      public:
        host: heat.openstack-helm.org
    scheme:
      public: https
    port:
      api:
        public: 443
  cloudformation:
    host_fqdn_override:
      public:
        host: cloudformation.openstack-helm.org
    scheme:
      public: https
    port:
      api:
        public: 443

manifests:
  ingress_api: false
  ingress_cfn: false
  service_ingress_api: false
  service_ingress_cfn: false

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: heat-api-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.orchestration.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: heat-api
              port: 8004
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: heat-cfn-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.cloudformation.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: heat-cfn
              port: 8000
...
