# Full TLS for Aodh: public endpoint TLS (terminated at the Envoy Gateway) AND
# gateway<->pod TLS (an nginx sidecar terminates TLS in the aodh-api pod; the
# gateway re-encrypts to it via a BackendTLSPolicy).
#
# Requires cert_manager_setup=true (ca-issuer ClusterIssuer) and
# osh_openstack_client_tls=true.
#
# The aodh-api container runs uwsgi in plain HTTP on the aodh "service" port
# (8042); the nginx sidecar terminates TLS on 443 and proxies to
# 127.0.0.1:8042. The Service keeps port 8042 but routes to 443 (targetPort).
---
network:
  api:
    target_port: 443
secrets:
  tls:
    # Outbound trust: aodh calls keystone over TLS, so its pods and the ks-*
    # jobs need the ca-issuer CA. CA-ONLY secret (just ca.crt, no private key),
    # mounted at /etc/ssl/certs/openstack-helm.crt. Assumes every in-pod TLS
    # server cert is signed by this one ca-issuer CA.
    ca: openstack-helm-ca

endpoints:
  identity:
    auth:
      admin:
        cacert: /etc/ssl/certs/openstack-helm.crt
      aodh:
        cacert: /etc/ssl/certs/openstack-helm.crt
    scheme:
      default: https
      internal: https
  alarming:
    host_fqdn_override:
      public:
        host: aodh.openstack-helm.org
    scheme:
      default: https
      public: https
      internal: https
    port:
      api:
        public: 443

conf:
  aodh:
    keystone_authtoken:
      cafile: /etc/ssl/certs/openstack-helm.crt
    service_credentials:
      cafile: /etc/ssl/certs/openstack-helm.crt

pod:
  extraContainers:
    aodh_api:
      - name: nginx-tls
        image: docker.io/nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        ports:
          - name: https
            containerPort: 443
        volumeMounts:
          - name: nginx-tls-certs
            mountPath: /etc/nginx/certs
            readOnly: true
          - name: nginx-tls-conf
            mountPath: /etc/nginx/conf.d
            readOnly: true
  extraVolumes:
    aodh_api:
      - name: nginx-tls-certs
        secret:
          secretName: aodh-tls-api
      - name: nginx-tls-conf
        configMap:
          name: aodh-nginx-tls

extraObjects:
  # Server certificate for the nginx sidecar (issued by the ca-issuer). SANs must
  # include the in-cluster Service FQDN so the gateway's BackendTLSPolicy hostname
  # validation succeeds.
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: aodh-tls-api
      namespace: "{{ .Release.Namespace }}"
    spec:
      secretName: aodh-tls-api
      issuerRef:
        name: ca-issuer
        kind: ClusterIssuer
      usages:
        - server auth
      dnsNames:
        - aodh-api
        - "aodh-api.{{ .Release.Namespace }}"
        - "aodh-api.{{ .Release.Namespace }}.svc.{{ .Values.endpoints.cluster_domain_suffix }}"
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: aodh-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.alarming.host_fqdn_override.public.host }}"
      parentRefs:
        - name: gateway-default
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: aodh-api
              port: 8042
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: aodh-nginx-tls
      namespace: "{{ .Release.Namespace }}"
    data:
      default.conf: |
        server {
            listen 443 ssl;
            server_name _;

            ssl_certificate     /etc/nginx/certs/tls.crt;
            ssl_certificate_key /etc/nginx/certs/tls.key;
            ssl_protocols       TLSv1.2 TLSv1.3;

            location / {
                proxy_pass http://127.0.0.1:8042;
                proxy_set_header Host {{`$host`}};
                proxy_set_header X-Forwarded-For {{`$proxy_add_x_forwarded_for`}};
                proxy_set_header X-Forwarded-Proto https;
            }
        }
  - apiVersion: gateway.networking.k8s.io/v1
    kind: BackendTLSPolicy
    metadata:
      name: aodh-api-backend-tls
      namespace: "{{ .Release.Namespace }}"
    spec:
      targetRefs:
        - group: ""
          kind: Service
          name: aodh-api
          sectionName: a-api
      validation:
        caCertificateRefs:
          - group: ""
            kind: Secret
            name: aodh-tls-api
        hostname: "aodh-api.{{ .Release.Namespace }}.svc.{{ .Values.endpoints.cluster_domain_suffix }}"
...
