- job:
    name: openstack-helm-blazar-2026-1-ubuntu_noble
    parent: openstack-helm-deploy
    nodeset: openstack-helm-3nodes-ubuntu_noble
    run:
      - playbooks/deploy-env.yaml
      - playbooks/deploy-blazar.yaml
    vars:
      osh_openstack_client_image_tag: "2026.1-ubuntu_noble"
      osh_values_overrides:
        - "2026.1-ubuntu_noble.yaml"
        - "gateway.yaml"
    files:
      - ^blazar/.*
      - ^playbooks/deploy-blazar\.yaml

