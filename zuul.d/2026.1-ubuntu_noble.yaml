- job:
    name: openstack-helm-swift-2026-1-ubuntu_noble
    parent: openstack-helm-deploy
    nodeset: openstack-helm-3nodes-ubuntu_noble
    run:
      - playbooks/deploy-env.yaml
      - playbooks/deploy-swift.yaml
    vars:
      loopback_format: true
      loopback_format_fs_type: ext4
      loopback_mount: true
      loopback_mount_path: /srv/node/loop100
      loopback_image: "/opt/ext_vol/openstack-helm/swift-loop.img"
      osh_openstack_client_image_tag: "2026.1-ubuntu_noble"
      osh_values_overrides:
        - "2026.1-ubuntu_noble.yaml"
        - "gateway.yaml"
    files:
      - ^swift/.*
