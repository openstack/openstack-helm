- job:
    name: openstack-helm-compute-kit-dpdk-2026-1-ubuntu_noble
    description: |
      Run the openstack-helm compute-kit job with DPDK enabled.
      We use single node environment to run this job which means
      that the job only tests that QEMU and OVS-DPDK are working
      together. The job does not assume having specific DPDK hardware.
    parent: openstack-helm-deploy
    nodeset: openstack-helm-1node-32GB-ubuntu_noble
    pre-run:
      - playbooks/enable-hugepages.yaml
      - playbooks/prepare-hosts.yaml
    run:
      - playbooks/deploy-env.yaml
      - playbooks/deploy-compute-kit.yaml
    vars:
      hugepages:
        enabled: true
        size: "2M"
        number: 2048
      osh_openstack_client_image_tag: "2026.1-ubuntu_noble"
      osh_values_overrides:
        - "2026.1-ubuntu_noble.yaml"
        - "gateway.yaml"
        - "dpdk.yaml"
    files:
      - ^roles/.*
      - ^openvswitch/.*
      - ^nova/.*
      - ^neutron/.*

