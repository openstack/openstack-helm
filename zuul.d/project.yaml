- project:
    vars:
      # shared across all jobs
      helm_version: "4.1.1"
      chart_testing_version: "3.11.0"
      virtualenv: "{{ ansible_user_dir }}/venv"
      base_version: "2026.1.0"

    templates:
      - publish-openstack-docs-pti
      - release-notes-jobs-python3
    check:
      jobs:
        - openstack-helm-linter
        - openstack-helm-pre-commit
        - openstack-helm-bandit
        # 2025.1 Ubuntu Noble
        - openstack-helm-cinder-2025-1-ubuntu_noble  # 5 nodes rook
        - openstack-helm-compute-kit-2025-1-ubuntu_noble  # 1 node + 3 nodes
        # 2025.2 Ubuntu Noble
        - openstack-helm-cinder-2025-2-ubuntu_noble  # 5 nodes rook
        - openstack-helm-compute-kit-2025-2-ubuntu_noble  # 3 nodes
        # 2026.1 Ubuntu Noble
        - openstack-helm-cinder-2026-1-ubuntu_noble  # 5 nodes rook
        - openstack-helm-compute-kit-2026-1-ubuntu_noble  # 3 nodes
        - openstack-helm-compute-kit-ovn-2026-1-ubuntu_noble  # 3 nodes
        - openstack-helm-compute-kit-dpdk-2026-1-ubuntu_noble  # 32GB node; run only if neutron, nova or openvswitch changed
        - openstack-helm-octavia-2026-1-ubuntu_noble  # 4 nodes
        - openstack-helm-blazar-2026-1-ubuntu_noble  # 3 nodes; run only if blazar changed
        - openstack-helm-cloudkitty-2026-1-ubuntu_noble  # 3 nodes; run only if cloudkitty changed
        - openstack-helm-freezer-2026-1-ubuntu_noble  # 3 nodes; run only if freezer changed
        - openstack-helm-horizon-2026-1-ubuntu_noble  # 1 node; run only if horizon changed
        - openstack-helm-skyline-2026-1-ubuntu_noble  # 3 nodes; run only if skyline changed
        - openstack-helm-swift-2026-1-ubuntu_noble  # 3 nodes; run only if swift changed
        - openstack-helm-tacker-2026-1-ubuntu_noble  # 3 nodes; run only if tacker changed
        - openstack-helm-trove-2026-1-ubuntu_noble  # 5 nodes rook; run only if trove changed
        - openstack-helm-zaqar-2026-1-ubuntu_noble  # 3 nodes; run only if zaqar changed
        # Infra jobs
        - openstack-helm-logging
        - openstack-helm-monitoring
    gate:
      jobs:
        - openstack-helm-linter
        - openstack-helm-cinder-2026-1-ubuntu_noble
        - openstack-helm-compute-kit-2026-1-ubuntu_noble
        - openstack-helm-logging
        - openstack-helm-monitoring
    post:
      jobs:
        - openstack-helm-publish-charts
...
